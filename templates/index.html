{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>🔍 Scan a URL or IP Address</h2>
    <p>Enter a URL or IP address to check for security threats.</p>

    <form action="/scan" method="POST">
        <input 
            type="text" 
            name="target" 
            placeholder="e.g. 8.8.8.8 or http://example.com"
            required
        />
        <button type="submit">Scan Now</button>
    </form>
</div>

{% if history %}
<div class="container" style="margin-top: 20px;">
    <h3>🕓 Recent Scans</h3>
    <table class="history-table">
        <thead>
            <tr>
                <th>Target</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody>
            {% for scan in history | reverse %}
            <tr>
                <td>{{ scan.target }}</td>
                <td class="{{ 'malicious' if scan.threat == 'HIGH RISK' else 'harmless' }}">
                    {{ scan.threat }}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endif %}

{% endblock %}
